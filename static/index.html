<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Күміс жапырақ</title>
<style>
:root{--washi:#faf5e8;--ink:#1a1410;--ink-light:#3a3028;--ink-faded:#6b5e52;--vermillion:#b33a2a;--gold:#b8944c;--gold-light:#d4b068;--indigo:#2a3050;--paper:#fdfaf2;--border:#c8b898}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,'Times New Roman',serif;background:#1e1a14;color:var(--ink);min-height:100vh}
.topbar{background:linear-gradient(180deg,#3a2a16 0%,#2a1a0c 100%);border-bottom:2px solid #6b4a28;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar .logo{font-size:1.2rem;color:var(--gold-light);letter-spacing:.06em;font-weight:bold;cursor:pointer}
.topbar .logo span{color:var(--vermillion);font-size:1.5rem}
.topbar nav{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.topbar nav button{background:none;border:1px solid #6b4a28;color:#c8b898;padding:6px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:.8rem}
.container{max-width:800px;margin:0 auto;padding:20px 16px 60px}
.card{background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:24px 28px;margin-bottom:16px}
.card h2{color:var(--ink);font-weight:normal;letter-spacing:.04em;margin-bottom:12px;font-size:1.2rem}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:.8rem;color:var(--ink-faded);margin-bottom:3px}
.form-group input,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:4px;font-family:inherit;font-size:.9rem;background:#fffdf7;color:var(--ink);outline:none}
.btn{padding:9px 16px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:.85rem;border:1px solid transparent}
.btn-primary{background:var(--vermillion);color:#fff;border-color:var(--vermillion)}
.btn-outline{background:transparent;border-color:var(--border);color:var(--ink-faded)}
.btn-small{padding:5px 10px;font-size:.75rem}
.book-item{background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:10px;cursor:pointer}
.book-item h3{color:var(--ink);font-size:1rem}
.book-item .meta{font-size:.75rem;color:var(--ink-faded)}
.book-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.like-btn{background:none;border:1px solid #d4a098;padding:5px 10px;border-radius:20px;cursor:pointer;font-size:.8rem;font-family:inherit;color:var(--ink-faded)}
.like-btn.liked{background:rgba(200,80,60,.1);border-color:var(--vermillion);color:var(--vermillion)}
.reader-content{font-size:1.1rem;line-height:2;color:var(--ink-light);white-space:pre-wrap;min-height:200px;padding:10px 0}
.reader-nav{display:flex;justify-content:space-between;margin-top:16px;gap:10px}
.hidden{display:none!important}
.flex-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.toast{position:fixed;bottom:20px;right:20px;background:#2a1a0c;border:1px solid #8a7a50;color:#e0d0b0;padding:10px 16px;border-radius:4px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;font-family:inherit;font-size:.82rem}
.toast.show{opacity:1}
</style>
</head>
<body>
<header class="topbar">
<div class="logo" onclick="showScreen('home')"><span>銀</span> Күміс жапырақ</div>
<nav>
<span id="userInfo" style="color:#8a7a60;font-size:.8rem;"></span>
<button onclick="showScreen('home')">Басты</button>
<button onclick="showScreen('books')">Кітаптар</button>
<button onclick="showScreen('addBook')">Қосу</button>
<button id="adminBtn" class="hidden" onclick="showScreen('admin')">Админ</button>
<button id="loginBtn" onclick="showScreen('login')">Кіру</button>
<button id="logoutBtn" class="hidden" onclick="logout()">Шығу</button>
</nav>
</header>
<div class="container" id="mainContainer"></div>
<div class="toast" id="toast"></div>
<script>
const API='';
let token=localStorage.getItem('token');
let me=null;
let likedBooks=[];
function showScreen(n,d=null){
let c=document.getElementById('mainContainer');
if(n==='home')c.innerHTML='<div class="card" style="text-align:center"><h1 style="color:var(--gold-light);">Күміс жапырақ</h1><p>銀の葉 · Кітапхана</p><button class="btn btn-primary" onclick="showScreen(\'books\')">Кітап оқу</button> <button class="btn btn-outline" onclick="showScreen(\'addBook\')">Кітап қосу</button></div>';
else if(n==='login')c.innerHTML='<div class="card"><h2>Кіру</h2><div class="form-group"><label>Аты</label><input id="loginUser"></div><div class="form-group"><label>Құпиясөз</label><input type="password" id="loginPass"></div><button class="btn btn-primary" onclick="doLogin()">Кіру</button><hr><h2>Тіркелу</h2><div class="form-group"><label>Аты</label><input id="regUser"></div><div class="form-group"><label>Құпиясөз</label><input type="password" id="regPass"></div><button class="btn btn-primary" onclick="doRegister()">Тіркелу</button></div>';
else if(n==='books'){c.innerHTML='<div class="card"><div class="flex-row"><input id="searchBooks" placeholder="Іздеу..." oninput="loadBooks()" style="flex:1;padding:8px;border:1px solid var(--border);border-radius:4px;font-family:inherit"></div><div id="booksList"></div></div>';loadBooks();}
else if(n==='addBook'){c.innerHTML='<div class="card"><h2>Жаңа кітап</h2><div class="form-group"><label>Аты</label><input id="bookTitle"></div><div class="form-group"><label>Автор</label><input id="bookAuthor"></div><div class="form-group"><label>Бет саны</label><input type="number" id="bookPageCount" value="3" min="1" onchange="genPages()"></div><div id="pageInputs"></div><button class="btn btn-primary" onclick="saveBook()">Сақтау</button></div>';setTimeout(genPages,100);}
else if(n==='admin'){c.innerHTML='<div class="card"><h2>Админ панель</h2><div id="adminStats"></div></div><div class="card"><h3>Қолданушылар</h3><div id="adminUsers"></div></div><div class="card"><h3>Кітаптар</h3><div id="adminBooks"></div></div>';loadAdminStats();}
else if(n==='read'){c.innerHTML='<div class="card"><button class="btn btn-outline btn-small" onclick="showScreen(\'books\')">← Артқа</button><h2 id="readerTitle"></h2><div class="reader-content" id="readerContent"></div><div class="reader-nav"><button class="btn btn-outline" id="prevPage" onclick="changePage(-1)">←</button><span id="pageIndicator"></span><button class="btn btn-outline" id="nextPage" onclick="changePage(1)">→</button></div><hr><h3>Пікірлер</h3><div id="commentsList"></div><input id="commentInput" placeholder="Пікір..." style="width:100%;padding:8px;border:1px solid var(--border);border-radius:4px;font-family:inherit;margin-top:6px"><button class="btn btn-outline btn-small" onclick="addComment()">Жіберу</button></div>';loadReader(d);}
updateUI();}
function updateUI(){
document.getElementById('userInfo').textContent=me?'👤 '+me.username:'';
document.getElementById('loginBtn').classList.toggle('hidden',!!me);
document.getElementById('logoutBtn').classList.toggle('hidden',!me);
document.getElementById('adminBtn').classList.toggle('hidden',!(me&&me.role==='admin'));}
async function api(url,method='GET',body=null){
let h={'Content-Type':'application/json'};
let full=API+url+(url.includes('?')?'&':'?')+'token='+(token||'');
let o={method,headers:h};
if(body)o.body=JSON.stringify(body);
let r=await fetch(full,o);
if(!r.ok){let e=await r.json().catch(()=>({detail:'Қате'}));throw new Error(e.detail||'Қате');}
return r.json();}
function toast(m){let e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000);}
async function doLogin(){
try{
let r=await api('/api/login','POST',{username:document.getElementById('loginUser').value,password:document.getElementById('loginPass').value});
token=r.token;me={id:r.user_id,username:r.username,role:r.role};
localStorage.setItem('token',token);toast('Сәлем, '+me.username+'!');showScreen('books');
}catch(e){toast(e.message);}}
async function doRegister(){
try{
let r=await api('/api/register','POST',{username:document.getElementById('regUser').value,password:document.getElementById('regPass').value});
token=r.token;me={id:r.user_id,username:r.username,role:r.role};
localStorage.setItem('token',token);toast('Қош келдіңіз!');showScreen('books');
}catch(e){toast(e.message);}}
function logout(){token='';me=null;localStorage.removeItem('token');likedBooks=[];toast('Шықтыңыз');showScreen('home');}
async function loadBooks(){
if(!me){showScreen('login');return;}
let s=document.getElementById('searchBooks')?.value||'';
try{
let books=await api('/api/books?search='+s);
likedBooks=await api('/api/liked');
let d=document.getElementById('booksList');
if(!books.length){d.innerHTML='<p style="text-align:center;color:#8a7a60;">Кітап жоқ</p>';return;}
d.innerHTML=books.map(b=>'<div class="book-item"><h3>📖 '+esc(b.title)+'</h3><div class="meta">'+esc(b.author)+' · '+b.page_count+' бет · ❤️ '+b.likes+'</div><div class="book-actions"><button class="like-btn'+(likedBooks.includes(b.id)?' liked':'')+'" onclick="event.stopPropagation();toggleLike('+b.id+')">'+(likedBooks.includes(b.id)?'❤️':'🤍')+' '+b.likes+'</button><button class="btn btn-outline btn-small" onclick="event.stopPropagation();showScreen(\'read\','+b.id+')">Оқу</button></div></div>').join('');
}catch(e){toast(e.message);}}
async function toggleLike(bid){
try{let r=await api('/api/like/'+bid,'POST');if(r.liked)likedBooks.push(bid);else likedBooks=likedBooks.filter(id=>id!==bid);loadBooks();}catch(e){toast(e.message);}}
function genPages(){
let n=parseInt(document.getElementById('bookPageCount')?.value||3);
let d=document.getElementById('pageInputs');if(!d)return;
d.innerHTML='';
for(let i=0;i<n;i++)d.innerHTML+='<div class="form-group"><label>'+(i+1)+'-бет</label><textarea class="pageText" rows="3"></textarea></div>';}
async function saveBook(){
if(!me){showScreen('login');return;}
let t=document.getElementById('bookTitle').value.trim();
if(!t)return toast('Атын енгізіңіз');
let pages=Array.from(document.querySelectorAll('.pageText')).map(x=>x.value.trim()).filter(x=>x);
if(!pages.length)return toast('Кемінде 1 бет жазыңыз');
try{await api('/api/books','POST',{title:t,author:document.getElementById('bookAuthor').value,description:'',genre:'Жалпы',pages:pages});toast('Сақталды!');showScreen('books');}catch(e){toast(e.message);}}
let currentBook=null,currentPage=0;
async function loadReader(bid){
try{currentBook=await api('/api/books/'+bid);currentPage=0;document.getElementById('readerTitle').textContent='「'+currentBook.title+'」 — '+esc(currentBook.author);renderPage();renderComments();}catch(e){toast(e.message);}}
function renderPage(){
document.getElementById('readerContent').textContent=currentBook.pages[currentPage]||'';
document.getElementById('pageIndicator').textContent=(currentPage+1)+' / '+currentBook.pages.length;
document.getElementById('prevPage').disabled=currentPage===0;
document.getElementById('nextPage').disabled=currentPage>=currentBook.pages.length-1;}
function changePage(d){let n=currentPage+d;if(n<0||n>=currentBook.pages.length)return;currentPage=n;renderPage();}
function renderComments(){
let d=document.getElementById('commentsList');
if(!currentBook.comments||!currentBook.comments.length){d.innerHTML='<p style="color:#8a7a60;">Пікір жоқ</p>';return;}
d.innerHTML=currentBook.comments.map(c=>'<div style="padding:4px 0;border-bottom:1px dotted #e0d8c4"><b>'+esc(c.username)+'</b>: '+esc(c.text)+'</div>').join('');}
async function addComment(){
if(!me){showScreen('login');return;}
let t=document.getElementById('commentInput').value.trim();
if(!t)return;
try{await api('/api/comments','POST',{book_id:currentBook.id,text:t});document.getElementById('commentInput').value='';currentBook=await api('/api/books/'+currentBook.id);renderComments();toast('Пікір қосылды');}catch(e){toast(e.message);}}
async function loadAdminStats(){
try{let s=await api('/api/admin/stats');document.getElementById('adminStats').innerHTML='<p>Қолданушы: <b>'+s.users+'</b> | Кітап: <b>'+s.books+'</b> | Пікір: <b>'+s.comments+'</b> | Лайк: <b>'+s.likes+'</b></p>';
let u=await api('/api/admin/users');document.getElementById('adminUsers').innerHTML=u.map(x=>'<div style="padding:4px 0;border-bottom:1px dotted #e0d8c4;display:flex;justify-content:space-between"><span>'+esc(x.username)+(x.role==='admin'?' 👑':'')+(x.banned?' 🚫':'')+'</span><div><button class="btn btn-outline btn-small" onclick="adminBan('+x.id+')">'+(x.banned?'Ашу':'Бұғаттау')+'</button>'+(x.role!=='admin'?'<button class="btn btn-outline btn-small" onclick="adminDel('+x.id+')">🗑</button>':'')+'</div></div>').join('');
let b=await api('/api/admin/books');document.getElementById('adminBooks').innerHTML=b.map(x=>'<div style="padding:4px 0;border-bottom:1px dotted #e0d8c4"><b>'+esc(x.title)+'</b> — '+esc(x.username)+(x.hidden?' 👁‍🗨':'')+' <button class="btn btn-outline btn-small" onclick="adminToggle('+x.id+')">'+(x.hidden?'Көрсету':'Жасыру')+'</button></div>').join('');}catch(e){toast(e.message);}}
async function adminBan(id){try{await api('/api/admin/users/'+id+'/ban','POST');loadAdminStats();}catch(e){toast(e.message);}}
async function adminDel(id){if(confirm('Жою керек пе?')){try{await api('/api/admin/users/'+id,'DELETE');loadAdminStats();}catch(e){toast(e.message);}}}
async function adminToggle(id){try{await api('/api/admin/books/'+id+'/toggle','POST');loadAdminStats();}catch(e){toast(e.message);}}
function esc(s){let d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
async function init(){
if(token){try{me=await api('/api/me');updateUI();showScreen('books');}catch(e){token='';localStorage.removeItem('token');me=null;showScreen('home');}}
else showScreen('home');}
init();
</script>
</body>
  </html>
